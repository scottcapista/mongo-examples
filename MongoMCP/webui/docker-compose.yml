services:
  webui:
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        rootfolder: ..
    ports:
      - "8001:8001"
    environment:
      - MONGO_MCP_ROOT=${MONGO_MCP_ROOT}
      - MONGO_CREDS=${MONGO_CREDS}
      - CACHE_NAMESPACE=local
      #- COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
      #- COGNITO_USERNAME=${COGNITO_USERNAME}
      #- COGNITO_PASSWORD=${COGNITO_PASSWORD}
    volumes:
      - ~/.aws:/root/.aws
